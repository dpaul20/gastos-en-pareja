name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Unit · E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout & Node ────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Lint & Unit tests (no infra needed) ───────────────────────────────
      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      # ── Supabase local ────────────────────────────────────────────────────
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Export Supabase env vars
        # supabase status -o env emits: ANON_KEY=..., SERVICE_ROLE_KEY=..., etc.
        run: |
          source <(supabase status -o env)
          echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"         >> $GITHUB_ENV
          echo "E2E_SUPABASE_SERVICE_KEY=$SERVICE_ROLE_KEY"       >> $GITHUB_ENV

      - name: Create E2E test user
        # global-setup.ts verifies the user exists before signing in;
        # email_confirm:true skips the confirmation email.
        env:
          # SERVICE_ROLE_KEY not yet in $GITHUB_ENV at this point — read from supabase status again
          SUPABASE_SERVICE_KEY: ${{ env.E2E_SUPABASE_SERVICE_KEY }}
        run: |
          SERVICE_KEY=$(supabase status -o json | python3 -c "import sys,json; print(json.load(sys.stdin)['SERVICE_ROLE_KEY'])")
          curl -sf -X POST http://127.0.0.1:54321/auth/v1/admin/users \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "email": "test@gastospareja.local",
              "password": "Test1234!",
              "email_confirm": true
            }'

      # ── Playwright ────────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # webServer in playwright.config.ts runs `npm run dev`
          # NODE_ENV=development is required so /api/test/sign-in responds
          NODE_ENV: development

      # ── Artifacts on failure ──────────────────────────────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

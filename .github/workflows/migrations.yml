name: migrations

# Production migrations run on every push to master (the app itself deploys
# via Vercel's native Git integration on the same push). supabase db push is
# idempotent — it only applies migration versions not yet recorded in prod.
on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: migrations-master
  cancel-in-progress: false

jobs:
  push-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.95.4

      - name: Apply migrations to production
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
